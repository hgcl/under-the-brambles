---
layout: default
title: Under the Brambles
head: |
  <style>
    .post-grid {
      padding: 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: var(--space-m);
      list-style: none;

      li {
        padding: 0;
      }
      a {
        padding: var(--space-m);
        border: var(--border);
        height: 100%;
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
        justify-content: center;
        text-align: center;
        text-decoration: none;
      }
      img {
        object-fit: contain;
      }
    }
  </style>
---


<ul class="post-grid" role="list">
  {% for post in site.posts %}
    <li>
      <a href="{{ post.url }}"><img src="{{ post.image }}" alt="" width="100px" height="100px"/><span>{{ post.title }}</span></a>
    </li>
  {% endfor %}
</ul>
